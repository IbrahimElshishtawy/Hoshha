<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>إضافة معاملة - Hawsha</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --font-be-vietnam: 'Be+Vietnam+Pro', sans-serif;
            --font-ibm-plex: 'IBM+Plex+Sans+Arabic', sans-serif;
        }
        
        body {
            font-family: var(--font-ibm-plex);
            background-color: #faf8ff;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .primary-shadow {
            box-shadow: 0px 10px 30px rgba(37, 99, 235, 0.15);
        }

        .soft-shadow {
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05);
        }

        .ai-glow {
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#f3f3fe",
                        "inverse-primary": "#b4c5ff",
                        "primary-container": "#2563eb",
                        "on-surface": "#191b23",
                        "primary": "#004ac6",
                        "outline-variant": "#c3c6d7",
                        "on-surface-variant": "#434655",
                        "on-primary": "#ffffff",
                        "background": "#faf8ff",
                        "surface-container": "#ededf9",
                        "surface": "#faf8ff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "radius-card": "20px",
                        "full": "9999px"
                    },
                    spacing: {
                        "stack-gap": "16px",
                        "inline-gap": "12px",
                        "container-margin": "20px",
                        "section-padding": "24px"
                    },
                    fontFamily: {
                        "headline-md": ["Be+Vietnam+Pro", "IBM+Plex+Sans+Arabic"],
                        "headline-sm": ["Be+Vietnam+Pro", "IBM+Plex+Sans+Arabic"],
                        "label-sm": ["IBM+Plex+Sans+Arabic"],
                        "body-md": ["IBM+Plex+Sans+Arabic"],
                        "body-lg": ["IBM+Plex+Sans+Arabic"]
                    },
                    fontSize: {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-24 overflow-x-hidden">
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex flex-row-reverse justify-between items-center px-container-margin h-16 bg-white/70 backdrop-blur-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)]">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container active:scale-95 transition-all">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">إضافة معاملة</h1>
<div class="w-10 h-10"></div> <!-- Spacer for balance -->
</header>
<main class="mt-20 px-container-margin space-y-stack-gap">
<!-- Segmented Control -->
<div class="flex p-1 bg-surface-container rounded-xl gap-1">
<button class="flex-1 py-2 rounded-lg font-body-lg transition-all bg-white text-primary shadow-sm" id="btn-expense" onclick="updateType('expense')">مصروف</button>
<button class="flex-1 py-2 rounded-lg font-body-lg transition-all text-on-surface-variant" id="btn-income" onclick="updateType('income')">دخل</button>
<button class="flex-1 py-2 rounded-lg font-body-lg transition-all text-on-surface-variant" id="btn-transfer" onclick="updateType('transfer')">تحويل</button>
</div>
<!-- Amount Input Area -->
<div class="flex flex-col items-center justify-center py-8 space-y-2">
<span class="text-on-surface-variant font-label-sm">أدخل المبلغ</span>
<div class="flex items-center gap-2">
<span class="text-headline-md font-headline-md text-primary-container">ريال</span>
<input autofocus="" class="bg-transparent border-none focus:ring-0 text-center w-48 text-4xl font-bold text-on-surface placeholder-outline-variant" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Form Fields Section -->
<div class="space-y-4">
<!-- Category with AI Glow -->
<div class="group">
<label class="block mb-2 font-label-sm text-on-surface-variant px-1">تصنيف</label>
<div class="glass-input p-4 rounded-radius-card flex items-center justify-between ai-glow cursor-pointer active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined">category</span>
</div>
<span class="font-body-lg text-on-surface">اختر التصنيف</span>
</div>
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 bg-primary-container/20 text-primary text-[10px] rounded-full font-bold uppercase tracking-wider">AI Suggestion</span>
<span class="material-symbols-outlined text-outline-variant">chevron_left</span>
</div>
</div>
</div>
<!-- Wallet -->
<div>
<label class="block mb-2 font-label-sm text-on-surface-variant px-1">المحفظة</label>
<div class="glass-input p-4 rounded-radius-card flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<span class="font-body-lg text-on-surface">محفظتي الشخصية</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_left</span>
</div>
</div>
<!-- Date & Time -->
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block mb-2 font-label-sm text-on-surface-variant px-1">التاريخ</label>
<div class="glass-input p-4 rounded-radius-card flex items-center gap-3 cursor-pointer">
<span class="material-symbols-outlined text-outline">calendar_today</span>
<span class="font-body-md text-on-surface">اليوم</span>
</div>
</div>
<div>
<label class="block mb-2 font-label-sm text-on-surface-variant px-1">الوقت</label>
<div class="glass-input p-4 rounded-radius-card flex items-center gap-3 cursor-pointer">
<span class="material-symbols-outlined text-outline">schedule</span>
<span class="font-body-md text-on-surface">10:45 ص</span>
</div>
</div>
</div>
<!-- Notes -->
<div>
<label class="block mb-2 font-label-sm text-on-surface-variant px-1">ملاحظات</label>
<div class="glass-input p-4 rounded-radius-card">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-on-surface p-0 resize-none font-body-md" placeholder="أضف ملاحظاتك هنا..." rows="2"></textarea>
</div>
</div>
</div>
<!-- Quick Actions Grid -->
<div class="grid grid-cols-3 gap-4 pt-2">
<button class="glass-input p-4 rounded-radius-card flex flex-col items-center gap-2 active:scale-95 transition-all text-on-surface-variant">
<span class="material-symbols-outlined">mic</span>
<span class="font-label-sm">إدخال صوتي</span>
</button>
<button class="glass-input p-4 rounded-radius-card flex flex-col items-center gap-2 active:scale-95 transition-all text-on-surface-variant">
<span class="material-symbols-outlined">photo_camera</span>
<span class="font-label-sm">إرفاق إيصال</span>
</button>
<button class="glass-input p-4 rounded-radius-card flex flex-col items-center gap-2 active:scale-95 transition-all text-on-surface-variant">
<span class="material-symbols-outlined">location_on</span>
<span class="font-label-sm">الموقع</span>
</button>
</div>
</main>
<!-- Fixed Footer with Save Button -->
<div class="fixed bottom-0 left-0 w-full p-container-margin bg-white/70 backdrop-blur-xl">
<button class="w-full h-14 bg-primary text-white rounded-radius-card font-headline-sm primary-shadow active:scale-[0.97] transition-all flex items-center justify-center gap-2">
<span>حفظ المعاملة</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
<!-- Background Decoration for Glassmorphism depth -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="fixed bottom-20 left-0 -z-10 w-80 h-80 bg-secondary/5 rounded-full blur-3xl"></div>
<script>
        function updateType(type) {
            const btns = ['expense', 'income', 'transfer'];
            btns.forEach(b => {
                const el = document.getElementById(`btn-${b}`);
                if (b === type) {
                    el.classList.add('bg-white', 'text-primary', 'shadow-sm');
                    el.classList.remove('text-on-surface-variant');
                } else {
                    el.classList.remove('bg-white', 'text-primary', 'shadow-sm');
                    el.classList.add('text-on-surface-variant');
                }
            });
        }

        // Simple animation on amount input
        const amountInput = document.querySelector('input[type="number"]');
        amountInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if(val.length > 6) {
                amountInput.style.fontSize = '2rem';
            } else {
                amountInput.style.fontSize = '2.25rem';
            }
        });

        // Add transaction micro-interaction
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> جاري الحفظ...';
            setTimeout(() => {
                this.innerHTML = '<span>تم الحفظ!</span><span class="material-symbols-outlined">done_all</span>';
                this.classList.replace('bg-primary', 'bg-secondary');
            }, 1000);
        });
    </script>
</body></html>
