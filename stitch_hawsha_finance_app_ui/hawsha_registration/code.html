<style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: #faf8ff;
            color: #191b23;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 24px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="min-h-screen flex flex-col items-center">
<!-- Main Container -->
<main class="w-full max-w-[480px] px-container-margin py-8 mb-12">
<!-- Header Illustration & Branding -->
<section class="flex flex-col items-center mb-8 text-center">
<div class="relative w-48 h-48 mb-6">
<img alt="Illustration representing financial growth and serenity" class="w-full h-full object-contain drop-shadow-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAzuE0RHzEtVAhN_-VldH46hLYqKUSCgcPb7ZBA5Ho4rnEKUy-R7bLD59ozNO2muZWFsUfieU5rOeMgOEInOrVJ1tTQ_4hNxxzTGKrm-1urTPZLnetnAMxyUZXUwnqIdjY6V1NDktj_C-_5CgufodA7RKxnSEMKoGB9fiEUrFbg55aYl33kWE8hatQXi_rhspgDDZI_cvahPx8lusV0gf5zIFM1TgPSWpTztbM2fy7RIwgSRuG38NhYt8amhp1grZQM9svYYcZSgV_R"/>
</div>
<div class="flex items-center gap-2 mb-4">
<div class="w-10 h-10 rounded-full primary-gradient flex items-center justify-center text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[24px]">account_balance_wallet</span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary">حوشة</h1>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">إنشاء حساب جديد</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">ابدأ رحلتك نحو إدارة أموالك بذكاء.</p>
</section>
<!-- Registration Form -->
<form class="space-y-4" id="register-form">
<!-- Full Name -->
<div class="space-y-1">
<label class="block mr-2 text-label-sm font-label-sm text-on-surface-variant">الاسم بالكامل</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute right-4 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full h-14 pr-12 pl-4 rounded-[20px] border border-outline-variant bg-surface focus:border-primary focus:ring-0 outline-none transition-all font-body-md text-body-md" placeholder="أدخل اسمك الثلاثي" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-1">
<label class="block mr-2 text-label-sm font-label-sm text-on-surface-variant">البريد الإلكتروني</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute right-4 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-14 pr-12 pl-4 rounded-[20px] border border-outline-variant bg-surface focus:border-primary focus:ring-0 outline-none transition-all font-body-md text-body-md text-left dir-ltr" placeholder="example@mail.com" type="email"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-1">
<label class="block mr-2 text-label-sm font-label-sm text-on-surface-variant">رقم الهاتف</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute right-4 text-outline group-focus-within:text-primary transition-colors">call</span>
<input class="w-full h-14 pr-12 pl-4 rounded-[20px] border border-outline-variant bg-surface focus:border-primary focus:ring-0 outline-none transition-all font-body-md text-body-md text-left dir-ltr" placeholder="05XXXXXXXX" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-1">
<label class="block mr-2 text-label-sm font-label-sm text-on-surface-variant">كلمة المرور</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute right-4 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-14 pr-12 pl-12 rounded-[20px] border border-outline-variant bg-surface focus:border-primary focus:ring-0 outline-none transition-all font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
<button class="absolute left-4 flex items-center justify-center text-outline hover:text-on-surface transition-colors" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined" id="password-toggle">visibility</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="px-2 mt-2">
<div class="h-1 w-full bg-outline-variant rounded-full overflow-hidden">
<div class="h-full bg-primary transition-all duration-500 w-1/3" id="strength-bar"></div>
</div>
<p class="text-[10px] text-on-surface-variant mt-1">تأكد من استخدام خليط من الأحرف والأرقام</p>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-1">
<label class="block mr-2 text-label-sm font-label-sm text-on-surface-variant">تأكيد كلمة المرور</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute right-4 text-outline group-focus-within:text-primary transition-colors">lock_reset</span>
<input class="w-full h-14 pr-12 pl-12 rounded-[20px] border border-outline-variant bg-surface focus:border-primary focus:ring-0 outline-none transition-all font-body-md text-body-md" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Checkboxes -->
<div class="space-y-3 pt-2 mr-2">
<label class="flex items-start gap-3 cursor-pointer">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 mt-0.5" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant">أوافق على <span class="text-primary font-semibold">الشروط والأحكام</span> و <span class="text-primary font-semibold">سياسة الخصوصية</span></span>
</label>
<label class="flex items-start gap-3 cursor-pointer">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 mt-0.5" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant">أريد استقبال النصائح والإشعارات المالية</span>
</label>
</div>
<!-- Primary Action -->
<button class="w-full h-14 primary-gradient text-white rounded-full font-headline-sm text-headline-sm shadow-lg shadow-primary/25 active:scale-95 transition-transform mt-4 flex items-center justify-center gap-2" type="submit">
                إنشاء حساب
                <span class="material-symbols-outlined">arrow_back</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="text-on-surface-variant font-label-sm text-label-sm">أو</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-14 rounded-[20px] border border-outline-variant bg-white hover:bg-surface-container transition-colors active:scale-95">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-md text-body-md text-on-surface">جوجل</span>
</button>
<button class="flex items-center justify-center gap-2 h-14 rounded-[20px] border border-outline-variant bg-white hover:bg-surface-container transition-colors active:scale-95">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path class="text-on-background" d="M17.05 20.28c-.98.95-2.05 1.45-3.21 1.45-1.16 0-2.02-.45-3.08-1.45C9.69 19.33 8.41 17.51 8.41 15.34c0-4.06 3.19-6.31 6.13-6.31 1.45 0 2.58.55 3.33 1.34-1.89 2.03-1.63 5.48.59 7.42-.45.98-1.02 1.76-1.41 2.49zM15.43 8.24c0-2.45 1.94-4.39 4.31-4.39.06 2.51-1.92 4.41-4.31 4.39z" fill="currentColor"></path>
<path class="text-on-background opacity-0" d="M12.07 10.15c-.48 0-.96.06-1.42.18-.46.12-.87.29-1.23.51-.36.22-.65.48-.87.79-.22.31-.33.66-.33 1.05 0 .54.19 1 .57 1.38.38.38.86.57 1.44.57.48 0 .96-.06 1.43-.18.47-.12.87-.29 1.22-.51.35-.22.64-.48.86-.79.22-.31.33-.66.33-1.05 0-.54-.19-1-.57-1.38-.38-.38-.87-.57-1.44-.57z" fill="currentColor"></path>
</svg>
<span class="font-body-md text-body-md text-on-surface">آبل</span>
</button>
</div>
<!-- Footer -->
<footer class="mt-12 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                لديك حساب بالفعل؟
                <a class="text-primary font-bold hover:underline" href="#">تسجيل الدخول</a>
</p>
</footer>
</main>
<script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = document.getElementById(id + '-toggle');
            if (input.type === "password") {
                input.type = "text";
                icon.innerText = "visibility_off";
            } else {
                input.type = "password";
                icon.innerText = "visibility";
            }
        }

        // Micro-interaction for strength indicator
        const pwdInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');
        pwdInput.addEventListener('input', (e) => {
            const length = e.target.value.length;
            if (length === 0) strengthBar.style.width = '0%';
            else if (length < 6) strengthBar.style.width = '33%';
            else if (length < 10) {
                strengthBar.style.width = '66%';
                strengthBar.className = 'h-full bg-secondary transition-all duration-500';
            } else {
                strengthBar.style.width = '100%';
                strengthBar.className = 'h-full bg-secondary transition-all duration-500';
            }
        });
    </script>
</body></html>
