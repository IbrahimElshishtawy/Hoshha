            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;

<body class="bg-surface text-on-surface flex flex-col min-h-screen">

<!-- Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-between px-container-margin pb-section-padding">

<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] aspect-square bg-primary/5 rounded-full blur-[80px]"></div>
<div class="relative z-10 animate-float w-full max-w-[360px] aspect-square flex items-center justify-center">

<img class="w-full h-full object-contain drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBx44eTeMghNWpuDbyKkVwvNacogqKVG72PLq_2sCUkRMmbfWKqORZNMBG7OVjHYKMtJFxWb0E_LXotuXqbtDTcAhNwW5QMu5cQipJrlXnWIyVEwTw2N7sbyHWujCtwnOd8HHC-eX0bDF8bATqFi79ivTFYgHUq22AxdAbBtQGwXxbybbRlapGoOolBKZ3FQFcIeTrcpFiJ10YCggZhxsKqoDanhb050EOiUQkddG8DwZFk-TV_NLzhjlp4kUpfPZMbjwZaT9poHzKG"/>
</div>
</div>
<!-- Copy & Action Section -->
<div class="w-full space-y-stack-gap text-center mb-8">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface">
                تتبع كل مصروفاتك بسهولة
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed max-w-[90%] mx-auto">
                سجل معاملاتك اليومية تلقائيًا وابقَ على اطلاع دائم بميزانيتك.
            </p>
</div>
<!-- Footer Actions -->
<div class="w-full flex flex-col items-center gap-8">
<!-- Progress Dots -->
<div class="flex gap-2">
<div class="w-8 h-2.5 rounded-full bg-primary-container transition-all duration-300"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest transition-all duration-300"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest transition-all duration-300"></div>
</div>
<!-- CTA Button -->
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-body-lg text-body-lg flex items-center justify-center gap-2 primary-shadow active:scale-[0.98] transition-all hover:brightness-110">

<span class="material-symbols-outlined rtl-mirror" style="font-size: 20px;">arrow_back</span>
</button>
</div>
</main>
<!-- Bottom Navigation (Filtered out for onboarding screen as per Destination Rule) -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-start px-container-margin pb-10">
<div class="flex items-center justify-center bg-primary text-on-primary rounded-full w-14 h-14 shadow-lg transition-all duration-300 active:scale-90 cursor-pointer">
<span class="material-symbols-outlined">west</span>
</div>
</div>
<script>
        // Simple micro-interaction for button hover/click
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.96)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        // Add subtle parallax effect on device orientation (if supported)
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                const img = document.querySelector('.animate-float');
                const x = event.beta / 45; // -2 to 2 range
                const y = event.gamma / 45; // -2 to 2 range
                
                if (img) {
                    img.style.transform = `translate(${y * 10}px, ${x * 10}px)`;
                }
            });
        }
    </script>
</body></html>
