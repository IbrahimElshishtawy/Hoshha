<!-- Micro-interaction Scripts -->
<script>
        // Subtle entrance animations
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.font-headline-md, .font-body-lg, .flex-row-reverse, button');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(15px)';
                el.style.transition = `all 0.6s cubic-bezier(0.16, 1, 0.3, 1) ${0.1 * index}s`;
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0px)';
                }, 100);
            });
        });
    </script>
