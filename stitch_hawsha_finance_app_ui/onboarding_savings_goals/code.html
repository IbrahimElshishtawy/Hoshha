<style>
        body {
            background-color: #faf8ff;
            font-family: 'IBM Plex Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05);
        }
        .floating-container {
            perspective: 1000px;
        }
        .float-anim {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 9999px;
            transition: all 0.3s ease;
        }
        .step-dot.active {
            width: 24px;
            background-color: #004ac6;
        }
    </style>
</head>
<body class="bg-background text-on-surface">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-transparent flex flex-row justify-between items-center px-container-margin py-4 z-50">
<!-- Logo/Brand Identity -->
<div class="font-headline-md text-headline-md text-primary font-bold">Hawsha</div>
<!-- Skip Action -->
<button class="font-body-lg text-body-lg text-on-surface-variant hover:opacity-80 transition-opacity cursor-pointer active:scale-95">
            تخطي
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin relative pb-32">
<!-- Background Ambient Glow -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/4 -right-1/4 w-96 h-96 bg-primary opacity-5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 -left-1/4 w-64 h-64 bg-secondary opacity-5 rounded-full blur-[80px]"></div>
</div>
<!-- 3D Illustration Container -->
<div class="w-full max-w-sm aspect-square relative flex items-center justify-center mb-12 floating-container">
<div class="float-anim w-full h-full">
<img alt="Financial Serenity Illustration" class="w-full h-full object-contain drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrLko2thn7ITuaZ1g4poTjw_7_iEINtfQ9UQfUIm6fXHTfLkTSLbX1Fzz33Xy5sgamt9nsw7EgJLaFyOcckd-NFaauPh7GAuBU9aHprUwC6NddtcSYGPeeGqgcCqUWiMn00jwP3LCVC6P94F-Q6lMmgUrVBpOc8OD-YgIe7DILog8ScXLQRvwDK0K2J0pog7dJZ_TC5P-c_lmR4aK6H_PjIUWjg-M3UbMBJJx_RvlITxk627ROouclLZZBHNJ2UFKbNuopmvPDd2gH"/>
</div>
<!-- Glass Decorative Element (Bento-style background accent) -->
<div class="absolute -z-10 w-[80%] h-[80%] glass-card rounded-[40px] rotate-6 transform opacity-40"></div>
</div>
<!-- Textual Content Group -->
<div class="w-full text-center max-w-md space-y-4">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-background tracking-tight">
                حدد أهداف الادخار والميزانيات
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed opacity-90 px-4">
                خطط لمستقبلك المالي من خلال إنشاء أهداف ادخار مخصصة وميزانيات ذكية.
            </p>
</div>
<!-- Progress Indicator (Step Dots) -->
<div class="flex flex-row-reverse gap-2 mt-10">
<div class="step-dot bg-outline-variant"></div>
<div class="step-dot active"></div>
<div class="step-dot bg-outline-variant"></div>
</div>
</main>
<!-- Footer Action / Bottom Navigation Placement -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-container-margin pb-10 gap-4">
<!-- Next Button -->
<button class="flex-grow h-[56px] bg-primary text-on-primary rounded-radius-card font-headline-sm text-headline-sm shadow-lg shadow-primary/20 hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-2 group">
            التالي
            <span class="material-symbols-outlined transition-transform group-hover:translate-x-[-4px]">arrow_back</span>
</button>
<!-- Back Button (Icon Only Style from Shared Components Logic) -->
<button class="w-14 h-14 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high active:scale-90 transition-all">
<span class="material-symbols-outlined">east</span>
</button>
</div>
<!-- Background Layering Effects -->
<script>
        // Subtle Mouse parallax for that "Depth-First" Hawsha feel
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            const illustration = document.querySelector('.floating-container');
            if (illustration) {
                illustration.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
            }
        });
    </script>
</body></html>
