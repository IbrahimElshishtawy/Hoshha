<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hawsha - تسجيل الدخول</title>

            src: url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');

            font-family: 'ibmPlexSans';
            src: url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap');

        body {
            font-family: 'ibmPlexSans', sans-serif;
            background-color: #faf8ff;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .input-focus-ring:focus-within {
            ring: 2px;
            ring-color: #004ac6;
        }

        /* Custom Scrollbar for better UX */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #dbe1ff;
            border-radius: 10px;
        }
    </style>

                      "surface-bright": "#faf8ff",
                      "on-tertiary-container": "#ffecea",

                      "surface-container-low": "#f3f3fe",
                      "on-primary": "#ffffff",
                      "surface-dim": "#d9d9e5",
                      "error-container": "#ffdad6",
                      "surface-container": "#ededf9",
                      "tertiary-fixed": "#ffdad7",
                      "on-background": "#191b23",
                      "on-tertiary": "#ffffff",
                      "primary-fixed": "#dbe1ff",
                      "outline-variant": "#c3c6d7",
                      "on-tertiary-fixed-variant": "#930013",
                      "on-primary-container": "#eeefff",
                      "primary-fixed-dim": "#b4c5ff",
                      "primary": "#004ac6",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-fixed": "#002113",
                      "error": "#ba1a1a",
                      "on-secondary-container": "#00714d",

                      "radius-card": "20px",
                      "inline-gap": "12px",
                      "container-margin": "20px",
                      "stack-gap": "16px"

              "fontFamily": {
                      "display-lg": ["beVietnamPro"],
                      "label-sm": ["ibmPlexSans"],
                      "headline-sm": ["beVietnamPro"],

                      "headline-md": ["beVietnamPro"],

              "fontSize": {

                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "display-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- Top App Bar (Suppress Nav as per task: Login is Transactional) -->
<header class="w-full top-0 sticky bg-transparent flex flex-row-reverse justify-between items-center px-container-margin py-4 z-50">
<div class="text-primary font-headline-md text-headline-md font-extrabold tracking-tight">حوشة</div>
<button class="text-primary dark:text-primary-fixed font-body-lg text-body-lg hover:opacity-80 transition-opacity cursor-pointer active:scale-95">تخطي</button>
</header>
<main class="w-full max-w-md px-container-margin flex flex-col items-center pb-12">
<!-- Illustration Section -->
<div class="w-full mt-4 mb-8 flex justify-center">
<div class="relative w-64 h-64">
<!-- Decorative Glow Background -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl"></div>
<img alt="Illustration" class="relative z-10 w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlhHVI61-X1zVQPAYvj2ouhl91CCDaVBu-LUk9mRSpbrDhgWLI8lxYAHSXYc6SLv3FKMge8fc-X8qT9B379gDwjYtO9WN-A0lg81rtWmfjMT8kqOOFi2SXAyahABlFu36d3OrYIkqMvn4N8J__EpYR1LnRR9i4Q8E2yhZ-KbO-DGcB6pFDZnHHKHmw-E4lDlZ-__YUtjZfcI8tJRFKTHVzBJ22ZLsYZe8_l61n_ZJGa7huRzRZ4PiBYvy2QQuMe063FMm14FPtBU4e"/>
</div>
</div>
<!-- Welcoming Text -->
<div class="w-full text-right space-y-2 mb-10">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface">تسجيل الدخول</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">مرحباً بك مجدداً في حوشة</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-stack-gap" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-outline px-1" for="email">البريد الإلكتروني</label>
<div class="relative flex items-center bg-surface-container-low rounded-radius-card border border-transparent focus-within:border-primary focus-within:bg-white transition-all duration-300">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-4 text-right font-body-md text-body-md placeholder:text-outline-variant" id="email" name="email" placeholder="name@example.com" type="email"/>
<span class="material-symbols-outlined text-outline-variant px-4">alternate_email</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-outline px-1" for="password">كلمة المرور</label>
<div class="relative flex items-center bg-surface-container-low rounded-radius-card border border-transparent focus-within:border-primary focus-within:bg-white transition-all duration-300">
<button class="text-outline-variant hover:text-primary transition-colors px-4 flex items-center justify-center" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passToggleIcon">visibility</span>
</button>
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-4 text-right font-body-md text-body-md placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined text-outline-variant px-4">lock</span>
</div>
</div>
<!-- Options Row -->
<div class="flex flex-row justify-between items-center px-1 pt-2">
<div class="flex items-center gap-2">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary transition-all" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">تذكرني</label>
</div>
<a class="font-body-md text-body-md text-primary font-semibold hover:underline" href="#">نسيت كلمة المرور؟</a>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-on-primary rounded-radius-card font-headline-sm text-headline-sm flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-transform duration-200 mt-6 group" type="submit">
<span>تسجيل الدخول</span>
<span class="material-symbols-outlined transform group-active:translate-x-1 transition-transform">west</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-4 my-8">
<div class="flex-grow h-px bg-outline-variant/30"></div>
<span class="font-label-sm text-label-sm text-outline">أو المتابعة باستخدام</span>
<div class="flex-grow h-px bg-outline-variant/30"></div>
</div>
<!-- Social Buttons -->
<div class="w-full grid grid-cols-2 gap-inline-gap">
<button class="flex items-center justify-center gap-3 py-3 px-4 glass-card rounded-radius-card border border-surface-variant hover:bg-surface-container-high transition-colors active:scale-95">
<span class="font-body-md text-body-md text-on-surface">Google</span>
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 glass-card rounded-radius-card border border-surface-variant hover:bg-surface-container-high transition-colors active:scale-95">
<span class="font-body-md text-body-md text-on-surface">Apple</span>
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.78-3.22 1.76-1.12-.02-1.48-.68-2.78-.68-1.3 0-1.71.66-2.78.7-.11 0-2.19-.07-3.32-1.71-2.29-3.32-2.18-8.49.56-11.41 1.37-1.45 3.12-2.23 4.54-2.23 1.09 0 2.14.46 2.76.46s1.65-.46 2.74-.46c.92.01 2.25.33 3.25 1.4-.07.06-1.95 1.14-1.93 3.44.02 2.79 2.45 3.75 2.48 3.76-.02.04-.39 1.34-1.3 2.97zM12.03 5.4c-.02-2.28 1.88-4.2 4.07-4.4.15 2.53-2.03 4.41-4.07 4.4z"></path>
</svg>
</button>
</div>
<!-- Footer link -->
<div class="mt-12 flex items-center gap-2">
<span class="font-body-md text-body-md text-on-surface-variant">ليس لديك حساب؟</span>
<a class="font-body-md text-body-md text-primary font-bold hover:underline" href="#">إنشاء حساب</a>
</div>
</main>
<!-- Decorative Bottom Gradient -->
<div class="fixed bottom-0 left-0 w-full h-1/4 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none -z-10"></div>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const toggleIcon = document.getElementById('passToggleIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        // Simple form interaction
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Visual feedback
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 1500);
        });
    </script>
</body></html>
